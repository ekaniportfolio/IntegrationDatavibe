name: Spatial Flow CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Quality Gate ──────────────────────────────────────────────────────────
  quality:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build (ESM + CJS)
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Missing ESM output" && exit 1)
          test -f dist/index.cjs || (echo "Missing CJS output" && exit 1)
          test -f dist/index.d.ts || (echo "Missing type declarations" && exit 1)
          echo "Build output verified."

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/index.js)
          echo "ESM bundle size: $SIZE bytes"
          # Fail if bundle exceeds 50KB (unminified)
          if [ "$SIZE" -gt 51200 ]; then
            echo "Bundle too large! ($SIZE bytes > 50KB limit)"
            exit 1
          fi

  # ─── Physics Parity Tests ──────────────────────────────────────────────────
  physics-parity:
    name: Physics Parity Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run physics parity tests
        run: npx vitest run tests/physics-parity.test.ts --reporter=verbose
        continue-on-error: false

  # ─── Publish to npm ────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [quality, physics-parity]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version changed
        id: version-check
        run: |
          PUBLISHED=$(npm view @spatial-flow/core version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already published. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing $CURRENT (was $PUBLISHED)"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
